# ==================================================================================================================== #
#                                                EXPERIMENT CONFIGURATION                                              # 
# ==================================================================================================================== #


project:
    name: MTGS-extension    # interact, InterAct-combinedsocial 
    version: 1.0.0
    description: architecture for modelling person gaze and gesture behaviour, and interactions

# ------------------------------------------------------------------------------------------------------------------- #

experiment:
    name: MTGS-NK #rinn-hgaze-n1-multivit-gaze_vec-ep15-amp
    group: null # /!\
    task: test # combination of {train, val, test, predict} separated by '+' sign. TODO: train+predict # /!\
    # dataset: combined_social # /!\ gazefollow, childplay, videoattentiontarget, videocoatt, uco_laeo, combined_social, vacation
    # dataset: videocoatt # /!\ gazefollow, childplay, videoattentiontarget, videocoatt, uco_laeo, combined_social, vacation
    # dataset: childplay # /!\ gazefollow, childplay, videoattentiontarget, videocoatt, uco_laeo, combined_social, vacation
    dataset: videoattentiontarget # /!\ gazefollow, childplay, videoattentiontarget, videocoatt, uco_laeo, combined_social, vacation
    # dataset: uco_laeo # /!\ gazefollow, childplay, videoattentiontarget, videocoatt, uco_laeo, combined_social, vacation
    path: ${hydra:runtime.cwd} # to retrieve logs and checkpoints
    cuda: 3

# ------------------------------------------------------------------------------------------------------------------- #

test:
    # checkpoint: "/home/nakatani/joint_attention_project/mtgs/checkpoints/combined_social/gazelle/gazelle_dist_model/gazelle_dinov2_vitb14_inout.pt"
    # checkpoint: "/home/nakatani/joint_attention_project/mtgs/checkpoints/combined_social/gazelle/gazelle_dist_model/gazelle_dinov2_vitb14_inout.ckpt"
    checkpoint: "/home/nakatani/joint_attention_project/mtgs/checkpoints/combined_social/2026-02-17/11-39-06_gazelle_1e-06/best.ckpt"

    batch_size: 1 # /!\
    device: ${train.device}

# ------------------------------------------------------------------------------------------------------------------- #

data:
    num_samples: 36000    # GazeFollow: 108955, VAT: 9000, childplay: 15000, combined_social: 36000, laeo: 2900
    # num_people: 10 # /!\ int or -1 for all
    num_people: all # /!\ int or -1 for all
    num_coatt: 40
    return_depth: False # /!\
    return_head_mask: False # /!\
    # image_size: 224 # /!\ used only for scene tokenizer
    image_size: 448 # /!\ used only for scene tokenizer
    heatmap_size: 64
    heatmap_sigma: 3
    temporal_context: 2    # 2; temporal context window # frames
    # temporal_context: 0    # 2; temporal context window # frames
    temporal_stride: 3    # 3; temporal stride for model input
    # temporal_stride: 0    # 3; temporal stride for model input
    vlm_dim: 24    # ava: 24, swig:406, hico:117 dimension of VLM context vector
    gf:
        root: /home-local/nakatani/dataset/gazefollow_extended
        root_depth: None
        root_focal: None
    coatt:
        root: data/VideoCoAtt_Dataset
    vat:
        root: /home-local/nakatani/dataset/videoattentiontarget
    laeo:
        root: /home-local/nakatani/dataset/ucolaeodb/
    childplay:
        root: /home-local/nakatani/dataset/ChildPlay-gaze
        root_depth: None
        root_focal: None
    # vacation:
    #     root: /idiap/temp/agupta/data/VACATION

# ------------------------------------------------------------------------------------------------------------------- #

model:
    model_name: 'gaze_lle'    # {sharingan_social, gaze_interact, geom_gaze}

# ------------------------------------------------------------------------------------------------------------------- #

optimizer:
    type: AdamW # not used
    lr: 1e-6 # /!\ 3e-6 (default)
    weight_decay: 1e-3 # /!\

# ------------------------------------------------------------------------------------------------------------------- #

scheduler:
    type: CosineAnnealingWarmRestarts # {CosineAnnealingWarmRestarts, StepLR}
    warmup_epochs: 4 # /!\
    t_0_epochs: 20 # /!\
    t_mult: 1 # /!\

# ------------------------------------------------------------------------------------------------------------------- #

train: 
    seed: 101 # /!\
    matmul_precision: medium # /!\ highest (default), high, medium
    precision: bf16-mixed # /!\ 64 (double), 32 (full), 16 (16bit mixed), bf16-mixed (bfloat16 mixed). Defaults to 32.
    epochs: 20 # /!\
    batch_size: 8 # /!\
    accumulate_grad_batches: 1 # /!\
    device: cuda
    resume: False
    resume_from: /idiap/temp/agupta/src/gaze_interact/checkpoints/last.ckpt
    freeze:
        gaze_encoder: False  # /!\
        gaze_encoder_backbone: False # /!\
        image_tokenizer: True  # /!\
        depth_tokenizer: False  # /!\
        vit_encoder: True  # /!\
        vit_adaptor: False  # /!\
        gaze_decoder: False  # /!\
        inout_decoder: False  # /!\
    swa:
        use: True # /!\
        lr: [1e-6, 1e-6, 1e-6, 1e-6, 3e-7] # /!\ {1e-6, [3e-6, 3e-6, 1e-6]} float, or list of floats for each param group in optimizer
        epoch_start: 12 # /!\
        annealing_epochs: 6 # /!\

# ------------------------------------------------------------------------------------------------------------------- #

val: 
    checkpoint: /idiap/temp/agupta/src/gaze_interact/experiments/2024-03-06/14-17-21/checkpoints/best.ckpt
    batch_size: 8 # /!\
    device: ${train.device}

# ------------------------------------------------------------------------------------------------------------------- #

predict:
    root: ../../../demo
    checkpoint: null
    batch_size: 1
    device: ${train.device}

# ------------------------------------------------------------------------------------------------------------------- #

wandb:
    log: True # /!\
    watch: null # /!\ null, gradients, parameters, all
    watch_freq: 500

# ------------------------------------------------------------------------------------------------------------------- #

hydra: 
    run: 
        dir: ./
    job: 
        chdir: True
